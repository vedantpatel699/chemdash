<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemDash — Equipment Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   ChemDash Design System v1.0 — Equipment Dashboard
   ═══════════════════════════════════════════════════ */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* Gold palette */
  --gold-800: #463B33;
  --gold-700: #763D16;
  --gold-600: #BB6E3D;
  --gold-500: #E29C57;
  --gold-400: #F9A471;
  --gold-300: #FCEEE5;
  --gold-200: #E9E3DE;
  --gold-100: #F7F6F2;

  /* Text */
  --text-primary: #32302F;
  --text-secondary: #615E5C;

  /* Status */
  --status-normal: #3A7D52;
  --status-normal-bg: #E5F0E8;
  --status-advisory: #C4890E;
  --status-advisory-bg: #FAF0E0;
  --status-critical: #D4432A;
  --status-critical-bg: #FCEBEB;

  /* Surfaces */
  --surface-page: #F7F6F2;
  --surface-card: #FFFFFF;
  --surface-sidebar: #463B33;
  --surface-chart: #F7F6F2;

  /* Borders & shadows */
  --border-card: #E9E3DE;
  --shadow-card: 0 1px 7px rgba(0,0,0,0.05), 0 0 16px rgba(0,0,0,0.05);
  --shadow-sidebar: 2px 0 8px rgba(0,0,0,0.06);
  --shadow-topbar: 0 2px 6px rgba(0,0,0,0.04);

  /* Radii */
  --radius-card: 16px;
  --radius-pill: 32px;
  --radius-status: 12px;
  --radius-chart-inner: 12px;
  --radius-alert: 10px;
  --radius-nav-icon: 8px;
  --radius-time-pill: 14px;

  /* Layout */
  --sidebar-width: 64px;
  --topbar-height: 56px;
  --content-margin: 24px;
  --tile-gap: 16px;

  /* Typography */
  --font-ui: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-data: 'IBM Plex Mono', 'SF Mono', 'Consolas', monospace;
}

body {
  font-family: var(--font-ui);
  background: var(--surface-page);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── LAYOUT SHELL ── */
.shell {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: var(--topbar-height) 1fr;
  height: 100vh;
  width: 100%;
}

/* ── SIDEBAR ── */
.sidebar {
  grid-row: 1 / -1;
  background: var(--surface-sidebar);
  box-shadow: var(--shadow-sidebar);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16px;
  z-index: 10;
}

.sidebar-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gold-500);
  margin-bottom: 28px;
}

.nav-item {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-nav-icon);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  cursor: pointer;
  transition: background 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.1); }
.nav-item.active { background: rgba(255,255,255,0.15); }

.nav-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  opacity: 0.4;
}
.nav-item.active .nav-dot { opacity: 1; }

/* ── TOPBAR ── */
.topbar {
  background: var(--surface-card);
  box-shadow: var(--shadow-topbar);
  display: flex;
  align-items: center;
  padding: 0 var(--content-margin);
  justify-content: space-between;
  z-index: 5;
}

.breadcrumb {
  font-size: 13px;
  color: var(--text-secondary);
}
.breadcrumb span { margin: 0 8px; opacity: 0.5; }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.time-pill {
  height: 32px;
  padding: 0 18px;
  border-radius: var(--radius-pill);
  background: var(--gold-100);
  border: 1px solid var(--border-card);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: background 0.15s;
}
.time-pill:hover { background: var(--gold-200); }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gold-600);
}

/* ── CONTENT AREA ── */
.content {
  padding: 20px var(--content-margin) var(--content-margin);
  overflow-y: auto;
  overflow-x: hidden;
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.section-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.section-sub .live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-normal);
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── KPI TILES ── */
.kpi-row {
  display: flex;
  gap: var(--tile-gap);
  margin-bottom: 20px;
}

.kpi-tile {
  flex: 1;
  min-width: 0;
  height: 130px;
  background: var(--surface-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.15s, transform 0.15s;
  cursor: default;
}
.kpi-tile:hover {
  border-color: var(--gold-500);
  transform: translateY(-1px);
}

.kpi-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.kpi-value-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
  margin-bottom: auto;
}

.kpi-value {
  font-family: var(--font-data);
  font-size: 28px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.2;
}

.kpi-unit {
  font-size: 13px;
  color: var(--text-secondary);
}

.kpi-footer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 24px;
  padding: 0 10px;
  border-radius: var(--radius-status);
  font-size: 11px;
  font-weight: 500;
}
.status-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.status-pill.normal { background: var(--status-normal-bg); color: var(--status-normal); }
.status-pill.normal .dot { background: var(--status-normal); }
.status-pill.advisory { background: var(--status-advisory-bg); color: var(--status-advisory); }
.status-pill.advisory .dot { background: var(--status-advisory); }
.status-pill.critical { background: var(--status-critical-bg); color: var(--status-critical); }
.status-pill.critical .dot { background: var(--status-critical); }

.kpi-delta {
  font-family: var(--font-data);
  font-size: 11px;
  font-weight: 500;
}
.kpi-delta.positive { color: var(--status-normal); }
.kpi-delta.negative { color: var(--status-critical); }

/* ── MAIN CONTENT GRID ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: var(--tile-gap);
}

/* ── CHART CARD ── */
.chart-card {
  background: var(--surface-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 20px 24px;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.chart-title {
  font-size: 15px;
  font-weight: 600;
}
.chart-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.time-ranges {
  display: flex;
  gap: 8px;
}
.time-range {
  width: 42px;
  height: 28px;
  border-radius: var(--radius-time-pill);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  background: var(--gold-100);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.time-range:hover { background: var(--gold-200); }
.time-range.active {
  background: var(--gold-800);
  color: white;
}

.chart-area {
  background: var(--surface-chart);
  border-radius: var(--radius-chart-inner);
  height: 280px;
  position: relative;
  overflow: hidden;
}

.chart-canvas {
  width: 100%;
  height: 100%;
}

.chart-legend {
  display: flex;
  gap: 24px;
  margin-top: 12px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}

.legend-line {
  width: 20px;
  height: 2px;
  border-radius: 1px;
}

/* ── RIGHT PANEL ── */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: var(--tile-gap);
}

.detail-card, .alert-card {
  background: var(--surface-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 18px 20px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.alert-badge {
  width: 22px;
  height: 22px;
  border-radius: 11px;
  background: var(--status-advisory-bg);
  color: var(--status-advisory);
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Detail rows */
.detail-row {
  display: flex;
  padding: 6px 0;
}
.detail-key {
  width: 120px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text-secondary);
}
.detail-val {
  font-family: var(--font-data);
  font-size: 12px;
  color: var(--text-primary);
}

/* Alert rows */
.alert-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.alert-row {
  background: var(--status-advisory-bg);
  border-radius: var(--radius-alert);
  padding: 12px 14px;
  border-left: 3px solid var(--status-advisory);
}

.alert-msg {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.5;
}

.alert-time {
  font-size: 11px;
  color: var(--text-secondary);
}

/* Action buttons */
.actions {
  display: flex;
  gap: var(--tile-gap);
  margin-top: 4px;
}

.btn {
  height: 36px;
  padding: 0 24px;
  border-radius: var(--radius-pill);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.btn-primary {
  background: var(--gold-800);
  color: white;
}
.btn-primary:hover { background: var(--gold-700); }
.btn-secondary {
  background: var(--surface-card);
  color: var(--text-primary);
  border: 1px solid var(--border-card);
}
.btn-secondary:hover { background: var(--gold-100); }
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <a class="sidebar-logo" href="welcome-home.html" title="Home"></a>
    <a class="nav-item" href="welcome-home.html" title="Dashboard"><div class="nav-dot"></div></a>
    <div class="nav-item active" title="Equipment"><div class="nav-dot"></div></div>
    <div class="nav-item" title="Alerts"><div class="nav-dot"></div></div>
    <div class="nav-item" title="Settings"><div class="nav-dot"></div></div>
  </nav>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="breadcrumb">
      <a href="welcome-home.html" style="color:inherit;text-decoration:none;">Home</a> <span>/</span> Equipment <span>/</span> RO Membrane Analyzer <span>/</span> Unit A-101
    </div>
    <div class="topbar-right">
      <div class="time-pill">Last 24 hours</div>
      <div class="avatar"></div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">
    <h1 class="section-title">RO Membrane Analyzer — Unit A-101</h1>
    <p class="section-sub"><span class="live-dot"></span>Live monitoring · Last updated 2 min ago</p>

    <!-- KPI ROW -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- CHART -->
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">Performance Trend</div>
            <div class="chart-subtitle">Normalized flux & TMP over time</div>
          </div>
          <div class="time-ranges">
            <button class="time-range">1H</button>
            <button class="time-range">6H</button>
            <button class="time-range active">24H</button>
            <button class="time-range">7D</button>
            <button class="time-range">30D</button>
          </div>
        </div>
        <div class="chart-area">
          <canvas id="trendChart" class="chart-canvas"></canvas>
        </div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-line" style="background: var(--gold-600)"></div>
            Normalized Flux
          </div>
          <div class="legend-item">
            <div class="legend-line" style="background: var(--status-advisory)"></div>
            TMP
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <!-- Equipment Details -->
        <div class="detail-card">
          <div class="card-title">Equipment Details</div>
          <div id="detailRows"></div>
        </div>

        <!-- Active Alerts -->
        <div class="alert-card">
          <div class="card-title">Active Alerts <span class="alert-badge">2</span></div>
          <div class="alert-list" id="alertList"></div>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-primary">Export</button>
          <button class="btn btn-secondary">Configure</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const kpis = [
  { label: 'Normalized Flux', value: '24.3', unit: 'LMH', status: 'normal', delta: '+1.2%' },
  { label: 'Salt Rejection', value: '98.2', unit: '%', status: 'normal', delta: '+0.1%' },
  { label: 'TMP', value: '3.1', unit: 'bar', status: 'advisory', delta: '+8.4%' },
  { label: 'Permeability', value: '7.8', unit: 'LMH/bar', status: 'normal', delta: '-0.5%' },
  { label: 'Recovery Rate', value: '42.5', unit: '%', status: 'normal', delta: '+0.3%' },
];

const details = [
  { key: 'Type', val: 'Reverse Osmosis Membrane' },
  { key: 'Model', val: 'Hydranautics CPA5-LD' },
  { key: 'Installed', val: '2024-03-15' },
  { key: 'Last CIP', val: '2025-04-20 (6 days ago)' },
  { key: 'Membrane age', val: '762 days' },
  { key: 'Location', val: 'Building A, Room 105' },
];

const alerts = [
  { msg: 'TMP rising above advisory threshold (3.0 bar)', time: '14 min ago' },
  { msg: 'Permeate conductivity drift detected', time: '2h ago' },
];

// ═══════════════════════════════════════════
// RENDER KPI TILES
// ═══════════════════════════════════════════

const kpiRow = document.getElementById('kpiRow');
kpis.forEach(k => {
  const deltaClass = k.delta.startsWith('+') ? 'positive' : k.delta.startsWith('-') ? 'negative' : '';
  kpiRow.innerHTML += `
    <div class="kpi-tile">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value-row">
        <span class="kpi-value">${k.value}</span>
        <span class="kpi-unit">${k.unit}</span>
      </div>
      <div class="kpi-footer">
        <span class="status-pill ${k.status}"><span class="dot"></span>${k.status.charAt(0).toUpperCase() + k.status.slice(1)}</span>
        <span class="kpi-delta ${deltaClass}">${k.delta}</span>
      </div>
    </div>`;
});

// ═══════════════════════════════════════════
// RENDER DETAILS
// ═══════════════════════════════════════════

const detailRows = document.getElementById('detailRows');
details.forEach(d => {
  detailRows.innerHTML += `
    <div class="detail-row">
      <div class="detail-key">${d.key}</div>
      <div class="detail-val">${d.val}</div>
    </div>`;
});

// ═══════════════════════════════════════════
// RENDER ALERTS
// ═══════════════════════════════════════════

const alertList = document.getElementById('alertList');
alerts.forEach(a => {
  alertList.innerHTML += `
    <div class="alert-row">
      <div class="alert-msg">${a.msg}</div>
      <div class="alert-time">${a.time}</div>
    </div>`;
});

// ═══════════════════════════════════════════
// TIME RANGE TOGGLE
// ═══════════════════════════════════════════

document.querySelectorAll('.time-range').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-range').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ═══════════════════════════════════════════
// CHART (Canvas 2D — no dependencies)
// ═══════════════════════════════════════════

function drawChart() {
  const canvas = document.getElementById('trendChart');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width, H = rect.height;
  const padL = 48, padR = 16, padT = 16, padB = 32;
  const chartW = W - padL - padR, chartH = H - padT - padB;

  // Grid
  const yLabels = [30, 25, 20, 15, 10, 5, 0];
  const style = getComputedStyle(document.documentElement);
  ctx.font = '10px IBM Plex Mono';
  ctx.fillStyle = style.getPropertyValue('--text-secondary').trim();
  ctx.strokeStyle = style.getPropertyValue('--gold-200').trim();
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;

  yLabels.forEach((v, i) => {
    const y = padT + (i / (yLabels.length - 1)) * chartH;
    ctx.globalAlpha = 1;
    ctx.textAlign = 'right';
    ctx.fillText(v.toString(), padL - 8, y + 4);
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + chartW, y);
    ctx.stroke();
  });

  // X-axis
  const xLabels = ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', 'Now'];
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  xLabels.forEach((v, i) => {
    const x = padL + (i / (xLabels.length - 1)) * chartW;
    ctx.fillText(v, x, H - 8);
  });

  // Flux data (simulated 24h)
  const fluxData = [22.1, 22.8, 23.0, 23.5, 24.1, 23.8, 24.5, 24.3, 23.9, 24.6, 24.8, 24.2,
                    23.7, 24.0, 24.3, 24.7, 25.0, 24.5, 24.1, 24.8, 25.2, 24.6, 24.3, 24.3];
  // TMP data
  const tmpData = [2.5, 2.6, 2.5, 2.7, 2.8, 2.7, 2.9, 3.0, 2.9, 3.0, 3.1, 3.0,
                   2.9, 3.0, 3.1, 3.0, 3.1, 3.2, 3.0, 3.1, 3.2, 3.1, 3.1, 3.1];

  function plotLine(data, color, width, opacity, yMin, yMax) {
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = padL + (i / (data.length - 1)) * chartW;
      const y = padT + ((yMax - v) / (yMax - yMin)) * chartH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  plotLine(fluxData, style.getPropertyValue('--gold-600').trim(), 2.5, 1, 0, 30);
  plotLine(tmpData, style.getPropertyValue('--status-advisory').trim(), 2, 0.7, 0, 30);

  // Advisory threshold line for TMP (3.0 bar → y value)
  const threshY = padT + ((30 - 3.0) / 30) * chartH;
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = style.getPropertyValue('--status-advisory').trim();
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(padL, threshY);
  ctx.lineTo(padL + chartW, threshY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.5;
  ctx.font = '9px IBM Plex Mono';
  ctx.textAlign = 'right';
  ctx.fillStyle = style.getPropertyValue('--status-advisory').trim();
  ctx.fillText('TMP threshold', padL + chartW - 4, threshY - 4);
  ctx.globalAlpha = 1;
}

drawChart();
window.addEventListener('resize', drawChart);
</script>
</body>
</html>
